[[rule]]
toolName = "run_shell_command"
# Common read-only commands that should not require user confirmation.
commandPrefix = [
  "ls",
  "cat",
  "pwd",
  "git status",
  "git diff",
  "git log",
  "git show",
  "find",
  "grep",
  "rg",
  "fd",
  "du",
  "df",
  "head",
  "tail",
  "echo",
  "which",
  "type",
  "file",
  "stat",
  "date",
  "uptime",
  "id",
  "whoami",
  "hostname",
  "brew list",
  "brew info",
  "brew bundle list",
  "code --list-extensions",
  "stow --version"
]
decision = "allow"
priority = 100
# Allow these commands even if they use redirection (e.g., ls > files.txt)
allowRedirection = true
